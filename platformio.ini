; PlatformIO configuration for PDP-11 emulator on M5Stack Cardputer
; MCU: ESP32-S3, Display: ST7789V2 240x135, Keyboard: physical matrix 56-key
; Hardware reset: physical side button on Cardputer (hard ESP32-S3 reset, no code needed)
;
; Board: m5stack-stamps3 (M5StampS3 — the MCU module inside the Cardputer)
; NOTE: The M5Cardputer board ID does not exist in the espressif32 platform;
;       m5stack-stamps3 is the correct PlatformIO board ID to use.
;
; IMPORTANT: The Arduino-ESP32 framework appends -std=gnu++11 after our flags.
; build_unflags removes it so that -std=gnu++17 takes effect for all TUs.
; This is required by kb11.h (if constexpr, inline variables) and rl11.h.

[env:m5cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
platform_packages =
    espressif/toolchain-xtensa-esp32s3 @ 12.2.0+20230208
board_build.arduino.memory_type = qio_opi
build_unflags =
    -std=gnu++11
    -std=c++11
    -std=gnu++14
    -std=c++14
build_flags =
    -std=gnu++17
    -O3
    -ffast-math
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    m5stack/M5Cardputer @ ^1.1.0
    m5stack/M5Unified @ ^0.2.8
    m5stack/M5GFX @ ^0.2.10
    fbiego/ESP32Time @ ^2.0.1
    fastled/FastLED @ ^3.6.0
